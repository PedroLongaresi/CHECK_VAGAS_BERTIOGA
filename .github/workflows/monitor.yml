name: 🏖️ Monitor SESC Bertioga

on:
  schedule:
    # Roda a cada 15 minutos entre 7h e 23h (horário de Brasília = UTC-3)
    # GitHub Actions usa UTC, então 7h BRT = 10h UTC, 23h BRT = 02h UTC
    - cron: "0,15,30,45 10-23 * * *"   # 07:00–20:45 BRT
    - cron: "0,15,30,45 0-2  * * *"    # 21:00–23:45 BRT
  workflow_dispatch:                    # Permite rodar manualmente pelo GitHub

jobs:
  verificar-vagas:
    name: Verificar vagas
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Código ──────────────────────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ── 3. Dependências ───────────────────────────────────────────────────
      - name: 📦 Instalar dependências
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      # ── 4. Executar monitor ───────────────────────────────────────────────
      - name: 🔍 Verificar vagas no SESC
        env:
          SESC_EMAIL:      ${{ secrets.SESC_EMAIL }}
          SESC_PASSWORD:   ${{ secrets.SESC_PASSWORD }}
          TELEGRAM_TOKEN:  ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FILTRO_MES:      ${{ vars.FILTRO_MES }}   # Opcional: "julho", "agosto"...
          FILTRO_ANO:      "2026"
        run: python scripts/monitor.py
