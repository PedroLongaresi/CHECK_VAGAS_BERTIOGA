name: 🏖️ Monitor SESC Bertioga

on:
  schedule:
    - cron: "0,20,40 9-23 * * *"   # 06:00–20:00 BRT
    - cron: "0,20,40 0-5  * * *"    # 21:00–02:00 BRT
    - cron: "0 3 * * *"                # 00:00 BRT — heartbeat diário
  workflow_dispatch:

jobs:
  verificar-vagas:
    name: Verificar vagas
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 📦 Instalar dependências
        run: pip install requests

      - name: 💓 Heartbeat diário (meia-noite BRT)
        if: github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PYEOF'
          import os, requests
          from datetime import datetime, timedelta
          token   = os.environ["TELEGRAM_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          brt = datetime.utcnow() - timedelta(hours=3)
          msg = (
              "💓 <b>Monitor SESC – Relatório diário</b>\n\n"
              "✅ Estou funcionando normalmente!\n"
              f"⏰ Meia-noite de {brt.strftime('%d/%m/%Y')}\n\n"
              "Verifico vagas a cada 20 min das 6h às 2h.\n"
              "Você só recebe mensagem quando aparecer vaga. 🏖️"
          )
          r = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={"chat_id": chat_id, "text": msg, "parse_mode": "HTML"},
              timeout=15,
          )
          print(f"Heartbeat: {r.status_code} - {r.text[:200]}")
          PYEOF

      - name: 🔍 Verificar vagas no SESC
        env:
          SESC_EMAIL:       ${{ secrets.SESC_EMAIL }}
          SESC_PASSWORD:    ${{ secrets.SESC_PASSWORD }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FILTRO_MES:       ${{ vars.FILTRO_MES }}
          FILTRO_ANO:       "2026"
        run: python scripts/monitor.py